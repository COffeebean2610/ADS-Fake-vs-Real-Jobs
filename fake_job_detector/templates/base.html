<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}JobGuard AI{% endblock %}</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <!-- Custom CSS -->
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
  {% block head %}{% endblock %}
</head>
<body>

<!-- ── NAVBAR ──────────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="mainNav">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('home') }}">
      <span class="brand-icon"><i class="bi bi-shield-check-fill"></i></span>
      <span class="brand-text">Job<span class="accent">Guard</span> <span class="badge-ai">AI</span></span>
    </a>

    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
            data-bs-target="#navMenu" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-1">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'home' %}active{% endif %}"
             href="{{ url_for('home') }}">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'predict' %}active{% endif %}"
             href="{{ url_for('predict') }}">
            <i class="bi bi-search me-1"></i>Detect
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'analytics' %}active{% endif %}"
             href="{{ url_for('analytics') }}">
            <i class="bi bi-bar-chart-line me-1"></i>Analytics
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'about' %}active{% endif %}"
             href="{{ url_for('about') }}">
            <i class="bi bi-info-circle me-1"></i>About
          </a>
        </li>
        <li class="nav-item ms-lg-2">
          <a class="btn btn-detect" href="{{ url_for('predict') }}">
            <i class="bi bi-lightning-charge-fill me-1"></i>Analyse Job
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- ── PAGE CONTENT ─────────────────────────────────────────────────────────── -->
<main>
  {% block content %}{% endblock %}
</main>

<!-- ── FOOTER ───────────────────────────────────────────────────────────────── -->
<footer class="site-footer mt-auto">
  <div class="container">
    <div class="row align-items-center py-4">
      <div class="col-md-6">
        <span class="brand-text footer-brand">
          <i class="bi bi-shield-check-fill me-1 accent"></i>
          Job<span class="accent">Guard</span> AI
        </span>
        <p class="text-muted small mb-0 mt-1">
          NLP-powered fake job detection for safer hiring.
        </p>
      </div>
      <div class="col-md-6 text-md-end mt-3 mt-md-0">
        <small class="text-muted">
          Built with <i class="bi bi-heart-fill text-danger"></i> using
          Flask · Scikit-learn · Bootstrap 5
        </small>
      </div>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
